<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>aGreend EXTREME OVERDRIVE Tree</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@700;900&display=swap');

      :root {
        --bg: #050505;
        --neon-cyan: #00f3ff;
        --neon-pink: #ff007c;
        --neon-green: #39ff14;
        --neon-gold: #ffd700;
        --metal: #2a2a35;
        --dark-metal: #121218;
      }

      html, body { 
        height: 100%; margin: 0; 
        background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg) 100%);
        color: white; 
        font-family: 'Orbitron', sans-serif;
        overflow: hidden;
      }

      /* CRT Scanline effect */
      body::after {
        content: ""; position: absolute; inset: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 4px, 6px 100%;
        pointer-events: none; z-index: 999; opacity: 0.4;
      }

      /* The HUD */
      .hud {
        position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
        display: flex; justify-content: space-between; box-sizing: border-box;
        pointer-events: none; z-index: 10;
      }

      .jackpot-box {
        background: var(--dark-metal); border: 4px solid var(--neon-gold);
        padding: 15px 30px; box-shadow: 0 0 20px var(--neon-gold), inset 0 0 10px var(--neon-gold);
        text-align: center; transform: skewX(-10deg);
        animation: pulse-gold 2s infinite;
      }

      .jackpot-box h1 {
        margin: 0; font-family: 'Black Ops One', cursive; font-size: 16px;
        color: var(--neon-gold); text-shadow: 2px 2px 0px #ff0000;
      }

      .jackpot-value {
        font-size: 42px; font-weight: 900; color: white;
        text-shadow: 0 0 10px var(--neon-gold), 0 0 20px #ff0000;
        letter-spacing: 2px;
      }

      .xp-box {
        background: var(--dark-metal); border: 4px solid var(--neon-cyan);
        padding: 15px 30px; box-shadow: 0 0 20px var(--neon-cyan);
        text-align: center; transform: skewX(10deg);
      }
      .xp-box h1 { margin: 0; font-size: 16px; color: var(--neon-cyan); }
      .xp-value { font-size: 36px; font-weight: 900; color: white; text-shadow: 0 0 10px var(--neon-cyan); }

      /* Borderlands-style Item Card */
      .item-card {
        position: absolute; bottom: 30px; right: 30px; width: 350px;
        background: rgba(10, 10, 15, 0.95); border: 3px solid var(--neon-pink);
        padding: 20px; z-index: 20; display: none;
        box-shadow: 10px 10px 0px rgba(255, 0, 124, 0.3);
        backdrop-filter: blur(5px);
      }
      
      .item-card::before { /* Warning stripes */
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 10px;
        background: repeating-linear-gradient(45deg, var(--neon-gold), var(--neon-gold) 10px, #000 10px, #000 20px);
      }

      .item-title { font-family: 'Black Ops One', cursive; font-size: 24px; color: var(--neon-pink); text-transform: uppercase; margin-top: 5px; text-shadow: 2px 2px 0px #000;}
      .item-meta { color: var(--neon-cyan); font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid var(--metal); padding-bottom: 5px; }
      .item-desc { font-family: sans-serif; font-size: 14px; color: #ddd; line-height: 1.5; margin-bottom: 15px; }
      .item-stats { display: flex; justify-content: space-between; font-size: 18px; font-weight: 900; color: var(--neon-green); }

      .btn-smash {
        width: 100%; padding: 15px; margin-top: 20px; font-family: 'Orbitron'; font-weight: 900; font-size: 18px;
        background: var(--neon-green); color: black; border: none; cursor: pointer;
        text-transform: uppercase; transition: all 0.1s; box-shadow: 0 0 15px var(--neon-green);
      }
      .btn-smash:hover { background: white; box-shadow: 0 0 30px white; transform: scale(1.05); }
      .btn-smash:disabled { background: var(--metal); color: #555; box-shadow: none; cursor: not-allowed; transform: none; }

      /* SVG Graph Styles */
      .svgwrap { position: absolute; inset: 0; cursor: crosshair; }
      svg { width: 100%; height: 100%; }
      
      .node { cursor: pointer; }
      .node rect { fill: var(--dark-metal); stroke: #444; stroke-width: 4; transition: all 0.2s; }
      .node:hover rect { stroke: white; filter: drop-shadow(0 0 10px white); }
      .node text { font-family: 'Orbitron', sans-serif; font-weight: 900; pointer-events: none; }
      .node .title { font-size: 16px; fill: #aaa; }
      .node .cost { font-size: 12px; fill: var(--neon-cyan); }

      /* LOCKED */
      .node.locked rect { stroke: #333; fill: #0a0a0a; }
      .node.locked .title { fill: #555; }

      /* UNLOCKED (THE SLOT MACHINE EFFECT) */
      .node.unlocked rect { 
        stroke: var(--neon-green); fill: #052205; 
        filter: drop-shadow(0 0 15px var(--neon-green));
      }
      .node.unlocked .title { fill: white; text-shadow: 0 0 5px var(--neon-green); }
      
      /* BLOCKED */
      .node.blocked rect { stroke: #ff0000; fill: #1a0000; stroke-dasharray: 5; }
      .node.blocked .title { fill: #aa0000; }

      /* EDGES (LASER BEAMS) */
      .edge { stroke: #333; stroke-width: 4; fill: none; }
      
      .edge.ready { 
        stroke: var(--neon-cyan); stroke-width: 6;
        stroke-dasharray: 15 10;
        animation: laser-flow 0.5s linear infinite;
        filter: drop-shadow(0 0 8px var(--neon-cyan));
      }

      .edge.unlocked {
        stroke: var(--neon-green); stroke-width: 6;
        filter: drop-shadow(0 0 15px var(--neon-green));
      }

      @keyframes laser-flow { to { stroke-dashoffset: -25; } }
      @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 15px var(--neon-gold); } 50% { box-shadow: 0 0 35px var(--neon-gold), inset 0 0 20px var(--neon-gold); } }
      @keyframes screen-shake { 0%, 100% { transform: translate(0, 0); } 20% { transform: translate(-5px, 3px); } 40% { transform: translate(4px, -2px); } 60% { transform: translate(-3px, -4px); } 80% { transform: translate(5px, 5px); } }

      .shake { animation: screen-shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
    </style>
  </head>
  <body>
    <div class="hud">
      <div class="xp-box">
        <h1>ECO-XP BANK</h1>
        <div class="xp-value" id="xp">1,250</div>
      </div>
      <div class="jackpot-box">
        <h1>💰 SAVINGS JACKPOT 💰</h1>
        <div class="jackpot-value" id="money">$14,200</div>
      </div>
    </div>

    <div class="svgwrap">
      <svg id="svg" viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
        <g id="viewport">
          <g id="edges"></g>
          <g id="nodes"></g>
        </g>
      </svg>
    </div>

    <div class="item-card" id="card">
      <div class="item-title" id="selTitle">SKILL NAME</div>
      <div class="item-meta" id="selMeta">RARITY: LEGENDARY</div>
      <div class="item-desc" id="selDesc">Skill description goes here. It does massive damage to carbon footprints.</div>
      <div class="item-stats">
        <span id="selCost">COST: 50 XP</span>
        <span id="selGain" style="color: var(--neon-gold);">PAYOUT: $500</span>
      </div>
      <button class="btn-smash" id="unlockBtn">O V E R R I D E</button>
    </div>

    <script>
      const skills = [
        { id:"s1", title:"CARBON BASICS", meta:"TIER 1 • FOUNDATION", desc:"Unlocks the ability to perceive invisible Scope 1 emissions with the naked eye.", x:600, y:100, xpCost:100, moneyGain:1000, prereq:[] },
        { id:"s2", title:"SUPPLIER INTERROGATION", meta:"TIER 2 • OFFENSE", desc:"Rip data directly from the hands of non-compliant vendors.", x:400, y:300, xpCost:250, moneyGain:2500, prereq:["s1"] },
        { id:"s3", title:"DATA LAUNDERING", meta:"TIER 2 • DEFENSE", desc:"Scrub dirty data until it shines like a diamond for the auditors.", x:800, y:300, xpCost:250, moneyGain:2500, prereq:["s1"] },
        { id:"s4", title:"SCOPE 3 ANNIHILATION", meta:"TIER 3 • ULTIMATE", desc:"Target and destroy supply chain emissions globally. Massive ROI.", x:600, y:500, xpCost:500, moneyGain:8200, prereq:["s2","s3"] },
        { id:"s5", title:"GREENWASH SHIELD", meta:"TIER 3 • PASSIVE", desc:"Immunity to PR disasters. +50% to corporate reputation.", x:200, y:500, xpCost:300, moneyGain:4000, prereq:["s2"] },
        { id:"s6", title:"TAXONOMY HACKER", meta:"TIER 3 • PASSIVE", desc:"Instantly decrypt EU compliance frameworks.", x:1000, y:500, xpCost:300, moneyGain:4000, prereq:["s3"] }
      ];

      const state = { xp: 1250, money: 14200, unlocked: new Set(["s1"]), selected: null, scale: 1, panX: 0, panY: 0 };
      const el = (id) => document.getElementById(id);

      function formatMoney(n) { return "$" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

      function updateHUD() {
        el("xp").textContent = state.xp.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        el("money").textContent = formatMoney(state.money);
      }

      function prereqsMet(skill) { return skill.prereq.every(p => state.unlocked.has(p)); }

      function statusOf(skill) {
        if(state.unlocked.has(skill.id)) return "unlocked";
        if(!prereqsMet(skill)) return "blocked";
        if(state.xp < skill.xpCost) return "locked";
        return "ready";
      }

      function draw() {
        const edges = el("edges"); const nodes = el("nodes");
        edges.innerHTML = ""; nodes.innerHTML = "";

        // Draw Edges (Lasers)
        for(const s of skills) {
          for(const p of s.prereq) {
            const from = skills.find(x => x.id === p);
            const x1 = from.x + 100; const y1 = from.y + 40;
            const x2 = s.x + 100; const y2 = s.y;
            const st = statusOf(s);
            
            let cls = "edge";
            if (st === "unlocked") cls = "edge unlocked";
            else if (st === "ready" || st === "locked") cls = "edge ready";

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M ${x1} ${y1} C ${x1} ${y1+80}, ${x2} ${y2-80}, ${x2} ${y2}`);
            path.setAttribute("class", cls);
            edges.appendChild(path);
          }
        }

        // Draw Nodes (Chunky Tech Panels)
        for(const s of skills) {
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          const st = statusOf(s);
          g.setAttribute("class", `node ${st}`);
          g.setAttribute("transform", `translate(${s.x},${s.y})`);
          g.dataset.id = s.id;

          const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          r.setAttribute("width", "200"); r.setAttribute("height", "80");
          r.setAttribute("rx", "10"); r.setAttribute("transform", "skewX(-10)");
          g.appendChild(r);

          const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
          t.setAttribute("x", "100"); t.setAttribute("y", "35");
          t.setAttribute("text-anchor", "middle"); t.setAttribute("class", "title");
          t.textContent = s.title;
          g.appendChild(t);

          const c = document.createElementNS("http://www.w3.org/2000/svg", "text");
          c.setAttribute("x", "100"); c.setAttribute("y", "60");
          c.setAttribute("text-anchor", "middle"); c.setAttribute("class", "cost");
          
          if(st === "unlocked") c.textContent = "ACQUIRED";
          else if(st === "blocked") { c.textContent = "LOCKED"; c.style.fill = "#aa0000"; }
          else c.textContent = `COST: ${s.xpCost} XP`;
          g.appendChild(c);

          g.addEventListener("click", () => selectSkill(s.id));
          nodes.appendChild(g);
        }
        applyTransform();
        updateHUD();
      }

      function selectSkill(id) {
        const s = skills.find(x => x.id === id);
        state.selected = id;
        const st = statusOf(s);

        el("selTitle").textContent = s.title;
        el("selMeta").textContent = s.meta;
        el("selDesc").textContent = s.desc;
        el("selCost").textContent = `COST: ${s.xpCost} XP`;
        el("selGain").textContent = `PAYOUT: ${formatMoney(s.moneyGain)}`;

        const btn = el("unlockBtn");
        if(st === "unlocked") { btn.textContent = "ALREADY OWNED"; btn.disabled = true; }
        else if(st === "blocked") { btn.textContent = "PREREQUISITES NOT MET"; btn.disabled = true; }
        else if(st === "locked") { btn.textContent = "NOT ENOUGH XP"; btn.disabled = true; }
        else { btn.textContent = "S M A S H  T O  U N L O C K"; btn.disabled = false; }

        el("card").style.display = "block";
      }

      function unlockSelected() {
        const s = skills.find(x => x.id === state.selected);
        if(!s || statusOf(s) !== "ready") return;

        // The Slot Machine / Explosion Effect
        document.body.classList.add("shake");
        setTimeout(() => document.body.classList.remove("shake"), 300);

        state.xp -= s.xpCost;
        
        // Slot machine money counter
        let currentMoney = state.money;
        state.money += s.moneyGain;
        state.unlocked.add(s.id);
        
        let ticks = 0;
        const interval = setInterval(() => {
          currentMoney += (s.moneyGain / 20);
          el("money").textContent = formatMoney(Math.floor(currentMoney));
          ticks++;
          if(ticks >= 20) {
            clearInterval(interval);
            draw();
            selectSkill(s.id);
          }
        }, 20);
      }

      function applyTransform() {
        el("viewport").setAttribute("transform", `translate(${state.panX},${state.panY}) scale(${state.scale})`);
      }

      let dragging = false, last = {x:0,y:0};
      el("svg").addEventListener("mousedown", (e) => { if(!e.target.closest(".node")) { dragging = true; last = {x:e.clientX, y:e.clientY}; }});
      window.addEventListener("mouseup", () => dragging = false);
      window.addEventListener("mousemove", (e) => {
        if(!dragging) return;
        state.panX += e.clientX - last.x; state.panY += e.clientY - last.y;
        last = {x:e.clientX, y:e.clientY}; applyTransform();
      });
      el("svg").addEventListener("wheel", (e) => {
        e.preventDefault();
        state.scale = Math.max(0.5, Math.min(2, state.scale + (e.deltaY > 0 ? -0.1 : 0.1)));
        applyTransform();
      }, {passive:false});

      el("unlockBtn").addEventListener("click", unlockSelected);
      el("card").addEventListener("click", (e) => { if(e.target.id !== "unlockBtn") el("card").style.display = "none"; });

      draw();
    </script>
  </body>
</html>
