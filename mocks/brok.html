        position: absolute;
        inset: 0;
        background:

        pointer-events: none;

      .hud {

        top: 0;
        left: 0;
        width: 100%;

        display: flex;
        justify-content: space-between;
        box-sizing: border-box;
        pointer-events: none;
        z-index: 10;

        border: 4px solid var(--neon-gold);
        padding: 15px 30px;
        box-shadow: 0 0 20px var(--neon-gold), inset 0 0 10px var(--neon-gold);
        text-align: center;
        transform: skewX(-10deg);
        animation: pulse-gold 2s infinite;
      }
      .jackpot-box h1 {
        margin: 0;
        font-family: 'Black Ops One', cursive;
        font-size: 16px;
        color: var(--neon-gold);
        text-shadow: 2px 2px 0px #ff0000;

      .jackpot-value {

        font-weight: 900;

        border: 4px solid var(--neon-cyan);
        padding: 15px 30px;
        box-shadow: 0 0 20px var(--neon-cyan);
        text-align: center;
        transform: skewX(10deg);

        text-transform: uppercase;
        background: var(--neon-pink);

        box-shadow: 0 0 15px var(--neon-pink);
      }
      .btn:hover {

        font-size: 14px;
        color: #ddd;
        line-height: 1.5;

      const state = {
        xp: 1250,
        money: 14200,
        unlocked: new Set(["s1"]),
        selected: null
      };

      const stats = {
        xpSpent: 0,
        moneyGained: 0,
        unlockCount: 0,
        byFamily: new Map()
      };

      const el = (id) => document.getElementById(id);

      function formatInt(n) { return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
      function formatMoney(n) { return "$" + Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

      function familyOf(id) {
        if (id.startsWith("sk-ca-")) return "CLIMATE ACTION";
        if (id.startsWith("sk-ce-")) return "CIRCULAR ECONOMY";
        if (id.startsWith("sk-so-")) return "SUSTAINABLE OPS";
        if (id.startsWith("sk-gi-")) return "GREEN INNOVATION";
        if (id.startsWith("gate-")) return "GATEWAYS";
        return "CORE TREE";
      }

      function updateHUD() {
        el("xp").textContent = formatInt(state.xp);
        el("money").textContent = formatMoney(state.money);
      }

      function prereqsMet(skill) {
        return (skill.prereq || []).every(p => state.unlocked.has(p));
      }

      function statusOf(skill) {
        if (state.unlocked.has(skill.id)) return "unlocked";
        if (!prereqsMet(skill)) return "blocked";
        if (state.xp < skill.xpCost) return "locked";
        return "ready";
      }

      function recordUnlock(skill) {
        stats.unlockCount += 1;
        stats.xpSpent += skill.xpCost;
        stats.moneyGained += skill.moneyGain;
        const fam = familyOf(skill.id);
        stats.byFamily.set(fam, (stats.byFamily.get(fam) || 0) + 1);
      }

      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
      function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

      async function tallyLine(elVal, from, to, fmt, durationMs) {
        const start = performance.now();
        while (true) {
          const t = (performance.now() - start) / durationMs;
          const k = t >= 1 ? 1 : easeOutCubic(t);
          const v = from + (to - from) * k;
          elVal.textContent = fmt(v);
          if (t >= 1) break;
          await sleep(33);
        }
      }

      async function showResults() {
        const overlay = el("results");
        const lines = el("resultsLines");
        lines.innerHTML = "";
        overlay.style.display = "flex";

        const mk = (label) => {
          const row = document.createElement("div");
          row.className = "rline";
          const l = document.createElement("div");
          l.className = "rlabel";
          l.textContent = label;
          const v = document.createElement("div");
          v.className = "rval";
          v.textContent = "0";
          row.appendChild(l);
          row.appendChild(v);
          lines.appendChild(row);
          return v;
        };

        const v1 = mk("SKILLS UNLOCKED");
        const v2 = mk("XP SPENT");
        const v3 = mk("MONEY EARNED");

        const famOrder = ["CORE TREE","GATEWAYS","CLIMATE ACTION","CIRCULAR ECONOMY","SUSTAINABLE OPS","GREEN INNOVATION"];
        const famVals = [];
        for (const f of famOrder) {
          const count = stats.byFamily.get(f) || 0;
          if (count === 0) continue;
          famVals.push([f, count, mk(f)]);
        }

        await sleep(180);
        await tallyLine(v1, 0, stats.unlockCount, (v)=>formatInt(v), 650);
        await sleep(120);
        await tallyLine(v2, 0, stats.xpSpent, (v)=>formatInt(v), 820);
        await sleep(120);
        await tallyLine(v3, 0, stats.moneyGained, (v)=>formatMoney(v), 980);

        for (const item of famVals) {
          await sleep(90);
          await tallyLine(item[2], 0, item[1], (v)=>formatInt(v), 520);
        }
      }

      function hideResults() { el("results").style.display = "none"; }

      // Cytoscape elements
      const elements = [];
      for (const s of skills) {
        elements.push({
          data: {
            id: s.id,
            label: s.title,
            meta: s.meta,
            desc: s.desc,
            xpCost: s.xpCost,
            moneyGain: s.moneyGain
          }
        });
      }
      for (const s of skills) {
        for (const p of (s.prereq || [])) {
          elements.push({
            data: {
              id: `${p}__${s.id}`,
              source: p,
              target: s.id
            }
          });
        }
      }

      cytoscape.use(cytoscapeDagre);

      const cy = cytoscape({
        container: document.getElementById("cy"),
        elements,
        wheelSensitivity: 0.15,
        style: [
          {
            selector: "node",
            style: {
              "shape": "round-rectangle",
              "width": 220,
              "height": 86,
              "background-color": "#0a0a0a",
              "border-width": 4,
              "border-color": "#444",
              "label": "data(label)",
              "text-wrap": "wrap",
              "text-max-width": 190,
              "text-valign": "center",
              "text-halign": "center",
              "font-family": "Orbitron",
              "font-size": 16,
              "font-weight": 900,
              "color": "#aaa"
            }
          },
          {
            selector: "edge",
            style: {
              "curve-style": "bezier",
              "target-arrow-shape": "triangle",
              "target-arrow-color": "#333",
              "line-color": "#333",
              "width": 4,
              "arrow-scale": 0.8,
              "opacity": 0.95
            }
          },
          {
            selector: "node.unlocked",
            style: {
              "border-color": "var(--neon-green)",
              "background-color": "#052205",
              "color": "#fff",
              "shadow-blur": 18,
              "shadow-color": "var(--neon-green)",
              "shadow-opacity": 0.9
            }
          },
          {
            selector: "node.ready",
            style: {
              "border-color": "var(--neon-cyan)",
              "background-color": "#041a1f",
              "color": "#fff",
              "shadow-blur": 16,
              "shadow-color": "var(--neon-cyan)",
              "shadow-opacity": 0.8
            }
          },
          {
            selector: "node.locked",
            style: {
              "border-color": "#333",
              "background-color": "#0a0a0a",
              "color": "#555",
              "opacity": 0.9
            }
          },
          {
            selector: "node.blocked",
            style: {
              "border-color": "#aa0000",
              "background-color": "#1a0000",
              "color": "#aa0000"
            }
          },
          {
            selector: "edge.ready",
            style: {
              "line-color": "var(--neon-cyan)",
              "target-arrow-color": "var(--neon-cyan)",
              "width": 6,
              "line-style": "dashed",
              "line-dash-pattern": [12, 8],
              "shadow-blur": 14,
              "shadow-color": "var(--neon-cyan)",
              "shadow-opacity": 0.7
            }
          },
          {
            selector: "edge.unlocked",
            style: {
              "line-color": "var(--neon-green)",
              "target-arrow-color": "var(--neon-green)",
              "width": 6,
              "shadow-blur": 18,
              "shadow-color": "var(--neon-green)",
              "shadow-opacity": 0.9
            }
          },
          {
            selector: "edge.opening",
            style: {
              "line-color": "var(--neon-gold)",
              "target-arrow-color": "var(--neon-gold)",
              "width": 10,
              "shadow-blur": 22,
              "shadow-color": "var(--neon-gold)",
              "shadow-opacity": 1.0
            }
          },
          {
            selector: "node:selected",
            style: {
              "border-color": "var(--neon-gold)",
              "shadow-blur": 22,
              "shadow-color": "var(--neon-gold)",
              "shadow-opacity": 1.0
            }
          }
        ],
        layout: {
          name: "dagre",
          rankDir: "TB",
          nodeSep: 60,
          rankSep: 110,
          edgeSep: 10
        }
      });

      function applyStatuses() {
        cy.nodes().forEach(n => {
          n.removeClass("unlocked ready locked blocked");
          const s = skills.find(x => x.id === n.id());
          if (!s) return;
          n.addClass(statusOf(s));
        });

        cy.edges().forEach(e => {
          e.removeClass("unlocked ready opening");
          const targetId = e.data("target");
          const targetSkill = skills.find(x => x.id === targetId);
          if (!targetSkill) return;

          const st = statusOf(targetSkill);
          if (st === "unlocked") e.addClass("unlocked");
          else if (st === "ready" || st === "locked") e.addClass("ready");
        });
      }

      function relayout() {
        cy.layout({
          name: "dagre",
          rankDir: "TB",
          nodeSep: 60,
          rankSep: 110,
          edgeSep: 10
        }).run();
      }

      function selectSkill(id) {
        const s = skills.find(x => x.id === id);
        if (!s) return;
        state.selected = id;

        el("selTitle").textContent = s.title;
        el("selMeta").textContent = s.meta;
        el("selDesc").textContent = s.desc;
        el("selCost").textContent = `COST: ${formatInt(s.xpCost)} XP`;
        el("selGain").textContent = `PAYOUT: ${formatMoney(s.moneyGain)}`;

        const st = statusOf(s);
        const btn = el("unlockBtn");
        if (st === "unlocked") { btn.textContent = "ALREADY OWNED"; btn.disabled = true; }
        else if (st === "blocked") { btn.textContent = "PREREQUISITES NOT MET"; btn.disabled = true; }
        else if (st === "locked") { btn.textContent = "NOT ENOUGH XP"; btn.disabled = true; }
        else { btn.textContent = "SMASH TO UNLOCK"; btn.disabled = false; }

        el("card").style.display = "block";
      }

      function animateOpeningEdges(unlockedId) {
        const incoming = cy.edges().filter(e => e.data("target") === unlockedId);
        incoming.addClass("opening");
        setTimeout(() => incoming.removeClass("opening"), 700);
      }

      function unlockSelected() {
        const s = skills.find(x => x.id === state.selected);
        if (!s || statusOf(s) !== "ready") return;

        document.body.classList.add("shake");
        setTimeout(() => document.body.classList.remove("shake"), 300);

        state.xp -= s.xpCost;
        state.money += s.moneyGain;
        state.unlocked.add(s.id);
        recordUnlock(s);

        updateHUD();
        applyStatuses();
        animateOpeningEdges(s.id);
        selectSkill(s.id);

        const n = cy.getElementById(s.id);
        if (n) {
          n.animate({ style: { "border-width": 8 } }, { duration: 220 })
           .promise("completed")
           .then(() => n.animate({ style: { "border-width": 4 } }, { duration: 240 }));
        }
      }

      cy.on("tap", "node", (evt) => {
        selectSkill(evt.target.id());
      });

      el("unlockBtn").addEventListener("click", unlockSelected);
      el("card").addEventListener("click", (e) => { if (e.target.id !== "unlockBtn") el("card").style.display = "none"; });

      el("resultsBtn").addEventListener("click", showResults);
      el("closeResults").addEventListener("click", hideResults);
      window.addEventListener("keydown", (e) => { if (e.key === "Escape") hideResults(); });
      el("relayoutBtn").addEventListener("click", relayout);

      updateHUD();
      applyStatuses();

      setTimeout(() => { cy.fit(undefined, 40); }, 80);
    </script>
